name: immunophenotyping_v3_webapp_operator
description: Automated immunophenotyping pipeline for flow cytometry data using PhenoGraph clustering.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  get_it: ^8.0.3
  shared_preferences: ^2.2.2
  font_awesome_flutter: ^10.8.0
  csv: ^6.0.0
  web: ^0.5.1
  # Tercen client — entity services for Flow E (workflow execution).
  # No sci_tercen_context needed: Type 3 apps use services directly.
  sci_tercen_client:
    git:
      url: https://github.com/tercen/sci_tercen_client.git
      ref: 1.15.1
      path: sci_tercen_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
